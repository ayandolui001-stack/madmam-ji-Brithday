<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Bidwiya | Crafted by Ayan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&family=Great+Vibes&display=swap');

        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Quicksand', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* Top Header */
        .top-header {
            font-family: 'Great Vibes', cursive;
            font-size: 1.8rem; color: #ff9a9e;
            margin-bottom: 20px; text-align: center;
            letter-spacing: 2px; animation: fadeInDown 1.5s;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            padding: 40px 25px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 88%; max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            position: relative; z-index: 10;
        }

        .name {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem; margin: 10px 0;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a18cd1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Countdown */
        .countdown { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .box { 
            background: rgba(255, 255, 255, 0.07); 
            padding: 10px; border-radius: 15px; width: 65px;
            border-bottom: 3px solid #ff9a9e;
        }
        .box span { display: block; font-size: 20px; font-weight: 700; }
        .box small { font-size: 9px; opacity: 0.7; text-transform: uppercase; }

        /* Hidden Wish Box */
        #wishBox {
            display: none;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            padding: 25px; border-radius: 25px;
            margin-top: 20px; font-size: 15px;
            line-height: 1.8; color: #fff;
            border: 1px solid #ff9a9e;
            animation: fadeInUp 0.5s ease;
            text-align: left;
        }

        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 20px; }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white; border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 12px 20px; border-radius: 50px; cursor: pointer; 
            font-size: 13px; transition: 0.3s; font-weight: 600;
        }
        .btn:hover { background: #ff9a9e; color: #1a0a2e; transform: scale(1.05); }

        /* Bottom Text */
        .bottom-footer {
            margin-top: 30px; text-align: center;
            font-size: 14px; color: rgba(255,255,255,0.7);
        }
        .bottom-footer b { color: #ff9a9e; }

        .drop { position: fixed; top: -50px; z-index: 100; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="top-header">A Beautiful Journey Awaits...</div>

    <div class="glass-card">
        <h1 class="name">Bidwiya Ji</h1>
        
        <div class="countdown">
            <div class="box"><span id="d">00</span><small>Days</small></div>
            <div class="box"><span id="h">00</span><small>Hrs</small></div>
            <div class="box"><span id="m">00</span><small>Min</small></div>
            <div class="box"><span id="s">00</span><small>Sec</small></div>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="toggleMusic()">🎵 Romantic Music</button>
            <button class="btn" onclick="celebrate()">🎆 Celebrate</button>
            <button class="btn" onclick="toggleWish()">💌 Message for you</button>
        </div>

        <div id="wishBox">
            ✨ <b>Dear Bidwiya,</b><br>
            তোর এই বিশেষ দিনটি যেন তোর জীবনের সবথেকে সুন্দর মুহূর্ত হয়ে ওঠে। তুই সবসময় এভাবেই হাসিখুশি থাকিস এবং তোর সব স্বপ্ন সত্যি হোক। তোর জন্য রইলো এক আকাশ ভালোবাসা আর শুভকামনা! 🌸💖
        </div>
    </div>

    <div class="bottom-footer">
        Made by <b>Ayan</b> for you <b>Bidwiya</b>
    </div>

    <audio id="romanticSong" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <audio id="fireworkSound">
        <source src="https://www.fesliyanstudios.com/play-mp3/6666" type="audio/mpeg">
    </audio>

    <script>
        // Constant Love Rain
        function startRain() {
            const items = ['🌸', '✨', '💖', '🌹'];
            setInterval(() => {
                const d = document.createElement('div');
                d.className = 'drop';
                d.innerText = items[Math.floor(Math.random()*items.length)];
                d.style.left = Math.random()*100+'vw';
                d.style.fontSize = Math.random()*10+15+'px';
                d.style.animationDuration = Math.random()*2+4+'s';
                document.body.appendChild(d);
                setTimeout(() => d.remove(), 5000);
            }, 600);
        }
        window.onload = startRain;

        // Timer
        function updateTimer() {
            const target = new Date('January 16, 2027 00:00:00').getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if (diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById('h').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            }
        }
        setInterval(updateTimer, 1000);

        // Music
        let playing = false;
        function toggleMusic() {
            const m = document.getElementById('romanticSong');
            if(playing) { m.pause(); playing = false; }
            else { m.play().then(() => playing = true).catch(() => alert("Touch screen then play!")); }
        }

        // Toggle Wish Message
        function toggleWish() {
            const box = document.getElementById('wishBox');
            box.style.display = (box.style.display === "block") ? "none" : "block";
        }

        // Celebrate with Sound
        function celebrate() {
            const snd = document.getElementById('fireworkSound');
            snd.currentTime = 0;
            snd.play(); // আতশবাজি ফাটার শব্দ

            const items = ['🎉', '✨', '🎁', '🎂', '🎊', '🎆'];
            for(let i=0; i<60; i++) {
                setTimeout(() => {
                    const d = document.createElement('div');
                    d.className = 'drop';
                    d.innerText = items[Math.floor(Math.random()*items.length)];
                    d.style.left = Math.random()*100+'vw';
                    d.style.animationDuration = '3s';
                    document.body.appendChild(d);
                    setTimeout(() => d.remove(), 3000);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
